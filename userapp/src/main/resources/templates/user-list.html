<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>User List</title>
</head>

<body>

<h2>Users</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Mobile</th>
</tr>

<tr th:each="user : ${users}">
<td th:text="${user.id}"></td>
<td th:text="${user.name}"></td>
<td th:text="${user.email}"></td>
<td th:text="${user.mobileNumber}"></td>
</tr>

</table>

<a href="/">Back</a>

</body>
</html>
